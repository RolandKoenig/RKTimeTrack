name: Continuous integration and delivery

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/continuous_integration_and_delivery.yml
      - scripts/build-and-test.ps1
      - scripts/docker-build.ps1
      - scripts/docker-build-and-push.ps1
      - src/**
      - Directory.Build.props
      - global.json

permissions:
  id-token: write
  contents: read
  
jobs:
  
  # Default CI / Testing
  build-and-test: 
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      
    - uses: actions/setup-dotnet@v4
      with:
        global-json-file: "./global.json"
      
    - name: Build and test
      shell: pwsh
      working-directory: ./scripts
      run: ./build-and-test.ps1
      
  # Create and push container   
  #  - Only for the main branch
  build-and-publish-container: 
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Docker build and publish
        shell: pwsh
        working-directory: ./scripts
        run: |
          ./docker-build-and-push.ps1 -DockerHubUser "${{ secrets.DOCKER_REGISTRY_USERNAME }}" `
                                      -DockerHubPassword "${{ secrets.DOCKER_REGISTRY_PASSWORD }}"

  # Deploy the container to prod
  #  - Only for the main branch
  deploy-to-prod:
    runs-on: ubuntu-latest
    needs: build-and-publish-container
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Az CLI login into Test Subscription using OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_PROD }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Deploy latest image from current branch to Azure Container App (PROD)
        shell: pwsh
        working-directory: ./scripts
        run: |
          ./deploy-to-prod.ps1 -DockerHubUser "${{ secrets.DOCKER_REGISTRY_USERNAME }}" `
                               -DockerHubPassword "${{ secrets.DOCKER_REGISTRY_PASSWORD }}"